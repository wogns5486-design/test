<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Recommendations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Crypto Recommendations</h1>
        <button id="theme-toggle">Dark Mode</button>
    </header>
    <main id="crypto-container">
        <!-- Crypto recommendations will be dynamically inserted here -->
    </main>
    <section id="contact-section">
        <h2>Partner with Us</h2>
        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="How can we partner together?" required></textarea>
            </div>
            <button type="submit" id="submit-btn">Send Inquiry</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2024 Crypto Recommendations</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
