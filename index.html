<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Intelligence Dashboard</title>
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>
    <header>
        <h1 id="site-title">Crypto Intelligence</h1>
        <div class="header-controls">
            <button id="lang-toggle">한국어</button>
            <button id="theme-toggle">Dark Mode</button>
        </div>
    </header>

    <section id="market-overview">
        <div class="sentiment-card">
            <h3 id="sentiment-label">Market Sentiment</h3>
            <div id="fear-greed-index">--</div>
            <p id="sentiment-status">Loading index...</p>
        </div>
        <div class="search-container">
            <input type="text" id="crypto-search" placeholder="Search coins (e.g. BTC, ETH)">
        </div>
    </section>

    <section id="exchange-section">
        <h2 id="exchange-title">Global Exchanges</h2>
        <div class="exchange-links">
            <a href="https://www.binance.com" target="_blank" class="exchange-card">Binance</a>
            <a href="https://www.upbit.com" target="_blank" class="exchange-card">Upbit</a>
            <a href="https://www.bithumb.com" target="_blank" class="exchange-card">Bithumb</a>
            <a href="https://www.coinbase.com" target="_blank" class="exchange-card">Coinbase</a>
        </div>
    </section>

    <main>
        <div class="table-header">
            <span class="h-rank">#</span>
            <span class="h-name" id="h-name">Name</span>
            <span class="h-desc" id="h-desc">Summary</span>
            <span class="h-price" id="h-price">Price (24h)</span>
        </div>
        <div id="crypto-container">
            <!-- Data injected here -->
        </div>
    </main>

    <section id="contact-section">
        <h2 id="contact-title">Partnership & Inquiries</h2>
        <form action="https://formspree.io/f/xvzwzwrj" method="POST">
            <div class="form-group">
                <label for="name" id="label-name">Name</label>
                <input type="text" id="name" name="name" placeholder="Name" required>
            </div>
            <div class="form-group">
                <label for="email" id="label-email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label for="message" id="label-message">Message</label>
                <textarea id="message" name="message" placeholder="Message" required></textarea>
            </div>
            <button type="submit" id="submit-btn">Send</button>
        </form>
    </section>

    <section id="comments-section">
        <h2 id="comments-title">Community Discussion</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://test1-8p7a9dlhgh.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
    </section>
    <footer>
        <p id="footer-text">&copy; 2024 Crypto Intelligence Platform</p>
    </footer>
    <script src="main.js?v=1.3"></script>
</body>
</html>
