<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Recommendations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="site-title">Crypto Recommendations</h1>
        <div class="header-controls">
            <button id="lang-toggle">한국어</button>
            <button id="theme-toggle">Dark Mode</button>
        </div>
    </header>

    <section id="exchange-section">
        <h2 id="exchange-title">Popular Exchanges</h2>
        <div class="exchange-links">
            <a href="https://www.binance.com" target="_blank" class="exchange-card">Binance</a>
            <a href="https://www.coinbase.com" target="_blank" class="exchange-card">Coinbase</a>
            <a href="https://www.upbit.com" target="_blank" class="exchange-card">Upbit</a>
            <a href="https://www.bithumb.com" target="_blank" class="exchange-card">Bithumb</a>
            <a href="https://www.kraken.com" target="_blank" class="exchange-card">Kraken</a>
        </div>
    </section>

    <main id="crypto-container">
        <!-- Crypto recommendations will be dynamically inserted here -->
    </main>

    <section id="contact-section">
        <h2 id="contact-title">Partner with Us</h2>
        <form action="https://formspree.io/f/xvzwzwrj" method="POST">
            <div class="form-group">
                <label for="name" id="label-name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email" id="label-email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="message" id="label-message">Message</label>
                <textarea id="message" name="message" placeholder="How can we partner together?" required></textarea>
            </div>
            <button type="submit" id="submit-btn">Send Inquiry</button>
        </form>
    </section>

    <section id="comments-section">
        <h2 id="comments-title">Comments</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://test1-8p7a9dlhgh.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
    <footer>
        <p id="footer-text">&copy; 2024 Crypto Recommendations</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
