name: 📊 Daily Crypto Report

on:
  schedule:
    # 매일 오전 7시 KST = 22:00 UTC (전날)
    - cron: '0 22 * * *'
  # 수동 테스트용 (GitHub Actions 탭에서 바로 실행 가능)
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Daily Report Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node agent/daily-report.js
